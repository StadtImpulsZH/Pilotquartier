<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadtimpuls ZH | Binzallee</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purple: #6a3093;
            --lime: #b4d433;
            --bg: #ffffff;
            --text: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.6; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--purple); }
        .logo span { color: var(--lime); }

        /* Hero */
        .hero {
            padding: 150px 5% 50px;
            text-align: center;
            background: linear-gradient(to bottom, #f9f9f9, #fff);
        }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2.5rem, 8vw, 6rem); line-height: 0.9; margin-bottom: 20px; text-transform: uppercase; }

        /* Vorher-Nachher Slider */
        .comparison-container {
            width: 90%;
            max-width: 1000px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            aspect-ratio: 16 / 9;
        }

        .comparison-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .before-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .after-image { 
            position: absolute; top: 0; left: 0; width: 50%; height: 100%; 
            overflow: hidden; border-right: 4px solid var(--lime);
        }

        .slider-handle {
            position: absolute;
            top: 0; left: 50%; height: 100%; width: 4px;
            background: var(--lime);
            transform: translateX(-50%);
            pointer-events: none;
        }
        .slider-handle::after {
            content: "↔";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: var(--lime);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--text);
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        input[type="range"] {
            position: absolute;
            top: 0; width: 100%; height: 100%;
            opacity: 0; cursor: col-resize;
            z-index: 10;
        }

        /* Vote Button */
        .vote-box { text-align: center; padding: 60px 0; }
        .btn-vote {
            padding: 20px 50px;
            background: var(--purple);
            color: white;
            text-decoration: none;
            font-weight: 800;
            border-radius: 100px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(106, 48, 147, 0.3);
            transition: 0.3s;
        }
        .btn-vote:hover { background: var(--lime); color: var(--text); transform: scale(1.05); }

        /* Galerie */
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px 5% 100px;
        }
        .photo-card { border-radius: 20px; overflow: hidden; height: 400px; border: 1px solid #eee; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 768px) { .photo-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">STADT<span>IMPULS</span></div>
        <div style="font-weight: 800; font-size: 0.8rem;">ZÜRICH</div>
    </nav>

    <main>
        <section class="hero">
            <h1>Binzallee<br><span style="color: var(--purple);">Transformation</span></h1>
            <p>Schiebe den Regler, um die Veränderung zu sehen.</p>
        </section>

        <div class="comparison-container">
            <div class="before-image">
                <img src="IMG_2032.png" alt="Vorher">
            </div>
            <div class="after-image" id="after-box">
                <img src="IMG_2031.png" alt="Nachher">
            </div>
            <div class="slider-handle" id="handle"></div>
            <input type="range" min="0" max="100" value="50" oninput="slide(this.value)">
        </div>

        <section class="vote-box">
            <a href="https://mitwirken.stadt-zuerich.ch/processes/pilotquartier/f/664/proposals/2334" target="_blank" class="btn-vote">🚀 Jetzt unterstützen & Voten</a>
        </section>

        <section class="photo-grid">
            <div class="photo-card">
                <img src="IMG_2033.png" alt="Binzallee Detail">
            </div>
            <div class="photo-card" style="background: var(--lime); display: flex; align-items: center; justify-content: center; padding: 40px;">
                <h2 style="font-family: 'Space Grotesk'; font-size: 2rem;">Farbe bringt Leben in das Quartier.</h2>
            </div>
        </section>
    </main>

    <script>
        function slide(val) {
            document.getElementById('after-box').style.width = val + "%";
            document.getElementById('handle').style.left = val + "%";
        }
    </script>

</body>
</html>
